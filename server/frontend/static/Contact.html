<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Best Cars Dealership</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" aria-current="page" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="card" style="width: 80%; margin: auto; margin-top: 5%; padding: 30px;">
    <h2 style="text-align: center; color: darkturquoise;">Contact Us</h2>
    <p style="text-align: center; color: grey;">We'd love to hear from you. Reach out to us through any of the channels below.</p>

    <div style="display: flex; flex-direction: row; flex-wrap: wrap; justify-content: space-around; margin-top: 30px;">
      <div class="card" style="width: 45%; min-width: 250px; margin: 10px; padding: 20px;">
        <img src="/static/contactus.png" alt="Contact" style="width: 80px; margin: auto; display: block;">
        <h4 style="text-align: center; margin-top: 15px;">Headquarters</h4>
        <p><strong>Address:</strong> 1234 Auto Drive, Detroit, MI 48201</p>
        <p><strong>Phone:</strong> +1 (800) 555-CARS</p>
        <p><strong>Email:</strong> info@bestcars.com</p>
        <p><strong>Hours:</strong> Mon-Fri 9AM-6PM EST</p>
      </div>

      <div class="card" style="width: 45%; min-width: 250px; margin: 10px; padding: 20px;">
        <h4 style="text-align: center; margin-top: 15px;">Send us a Message</h4>
        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="name" placeholder="John Doe">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com">
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="4" placeholder="How can we help you?"></textarea>
          </div>
          <button type="submit" class="btn" style="background-color: darkturquoise; color: white;">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
