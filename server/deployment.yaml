apiVersion: apps/v1
kind: Deployment
metadata:
  name: dealership-app
  labels:
    app: dealership
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dealership
  template:
    metadata:
      labels:
        app: dealership
    spec:
      containers:
        - name: dealership
          image: dealership-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: backend_url
              value: "http://nodeapp-service:3030"
            - name: sentiment_analyzer_url
              value: "http://sentiment-service:5050/"
---
apiVersion: v1
kind: Service
metadata:
  name: dealership-service
spec:
  selector:
    app: dealership
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30000
  type: NodePort
